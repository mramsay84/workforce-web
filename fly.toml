# fly.toml — Workforce marketing website
# Managed by DevOps team. Do not edit manually without coordination.

app = "workforce-web"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    NEXT_PUBLIC_SITE_URL = "https://workforce-web.fly.dev"
    NEXT_PUBLIC_SIGNUP_URL = "https://workforce-dev.rawaihub.com/signup"
    NEXT_PUBLIC_LOGIN_URL = "https://workforce-dev.rawaihub.com/login"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
